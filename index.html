<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homenaje Mamá - Rojo Brillante</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Great+Vibes&family=Cinzel:wght@400;700&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
    <style>
        /* Paleta de Rojos Intensos y Brillantes */
        :root {
            --red-glow: #ff0000;
            --red-bright: #ff4d4d;
            --red-dark: #4b0000;
            --gold: #ffd700;
            --bg-black: #0a0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #3d0000 0%, #0a0000 100%);
        }

        /* Contenedor principal */
        .container {
            position: relative;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* SOBRE ROJO */
        .envelope {
            position: relative;
            width: 320px;
            height: 220px;
            background: var(--red-dark);
            border: 2px solid var(--red-glow);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            cursor: pointer;
            z-index: 10;
            transition: transform 0.5s ease;
            border-radius: 5px;
        }

        .envelope:hover {
            transform: scale(1.02);
            box-shadow: 0 0 50px var(--red-glow);
        }

        /* Solapa del sobre */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 120px solid #660000;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 15;
        }

        .is-open .flap {
            transform: rotateX(180deg);
            z-index: 5;
        }

        /* Sello de Corazón Brillante */
        .seal {
            position: absolute;
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #ff0000, #990000);
            border-radius: 50%;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid var(--gold);
            box-shadow: 0 0 20px var(--red-glow);
            transition: all 0.3s ease;
            color: white;
            font-family: 'Cinzel';
            font-size: 0.7rem;
            text-align: center;
            font-weight: bold;
        }

        .is-open .seal {
            opacity: 0;
            transform: translateX(-50%) scale(0);
        }

        /* LA CARTA QUE SALE */
        .card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 290px;
            height: 200px;
            background: #ffffff;
            border-radius: 10px;
            padding: 25px;
            z-index: 1;
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            text-align: center;
            border: 4px solid var(--red-glow);
            box-shadow: inset 0 0 15px rgba(255, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .is-open .card {
            transform: translate(-50%, -50%) scale(1);
            height: 600px;
            width: 360px;
            opacity: 1;
            z-index: 30;
            top: 50%;
            background: linear-gradient(to bottom, #ffffff 0%, #ffebeb 100%);
        }

        /* Estilos Internos de la Carta */
        .logos {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.2));
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            color: #d00000;
            margin: 10px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .details {
            margin: 20px 0;
            color: #333;
        }

        .details p {
            font-size: 1.1rem;
            margin: 10px 0;
            font-weight: 600;
        }

        .red-text {
            color: #ff0000;
            font-family: 'Orbitron';
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .divider {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff0000, transparent);
            margin: 15px 0;
        }

        .footer {
            font-family: 'Cinzel';
            font-size: 0.8rem;
            color: #660000;
            font-weight: bold;
        }

        /* Partículas de Brillo */
        #canvas-sparks {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .tap-hint {
            margin-top: 20px;
            color: var(--red-bright);
            font-family: 'Orbitron';
            font-size: 0.7rem;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; transform: scale(1.1); }
        }

    </style>
</head>
<body>

    <canvas id="canvas-sparks"></canvas>

    <div class="container">
        <div class="envelope" id="main-envelope" onclick="toggleLetter()">
            <div class="flap"></div>
            <div class="seal">CON AMOR</div>
            
            <div class="card">
                <div class="logos">
                    <img src="image_cec3ef.png" alt="Colegio" class="logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/715/71500.png'">
                    <img src="image_cec3b1.png" alt="Promo" class="logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/714/71497.png'">
                </div>
                
                <div>
                    <p class="red-text">PROMOCIÓN ALENNO 2026</p>
                    <h1>Feliz día Mamá</h1>
                    <div class="divider"></div>
                    <p style="font-style: italic; color: #555; margin-bottom: 10px;">
                        "Porque tu amor es el brillo que guía nuestro camino."
                    </p>
                </div>

                <div class="details">
                    <p class="red-text">LUGAR</p>
                    <p>SALÓN 5TO A - I.E. 7220</p>
                    <div class="divider" style="width: 40%; margin: 10px auto;"></div>
                    <p class="red-text">FECHA Y HORA</p>
                    <p style="font-size: 1.4rem; color: #d00000;">08 MAYO | 4:30 PM</p>
                </div>

                <div class="footer">
                    TE ESPERAMOS CON EL CORAZÓN ABIERTO
                </div>
            </div>
        </div>
        
        <div class="tap-hint" id="hint">TOCA EL SOBRE PARA ABRIR</div>
    </div>

    <script>
        function toggleLetter() {
            const envelope = document.getElementById('main-envelope');
            const hint = document.getElementById('hint');
            envelope.classList.toggle('is-open');
            
            if(envelope.classList.contains('is-open')) {
                hint.style.display = 'none';
                startSparkles();
            } else {
                hint.style.display = 'block';
            }
        }

        // Sistema de partículas rojas y doradas
        const canvas = document.getElementById('canvas-sparks');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: canvas.height + 10,
                size: Math.random() * 3 + 1,
                speed: Math.random() * 2 + 0.5,
                color: Math.random() > 0.3 ? '#ff0000' : '#ffd700',
                opacity: Math.random()
            };
        }

        function startSparkles() {
            for(let i=0; i<50; i++) {
                particles.push(createParticle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.y -= p.speed;
                p.opacity -= 0.005;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.opacity;
                ctx.fill();

                if(p.opacity <= 0) {
                    particles[index] = createParticle();
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();
    </script>
</body>
</html>
